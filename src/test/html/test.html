<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 테스트 홈페이지</title>
</head>
<body>
<div>
    <input id="password" type="text" placeholder="사용자 ID를 입력하세요">
    <button onclick="login()">로그인</button>
</div>
<div id="response"></div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    // 예시: Axios 사용
    // Axios 설정
    axios.defaults.withCredentials = true;
    axios.defaults.headers.common['Access-Control-Allow-Origin'] = '*';
    axios.defaults.headers.common['Access-Control-Allow-Methods'] = 'GET, POST, PUT, DELETE, OPTIONS';
    axios.defaults.headers.common['Access-Control-Allow-Headers'] = 'content-type, x-access-token';

    function login() {
        const password = document.getElementById('password').value;

        axios.post('https://dm4buye7dda55.cloudfront.net/api/login', { password })
            .then(response => {
                console.log('서버 응답:', response.data);
                document.getElementById('response').innerText = response.data;
            })
            .catch(error => {
                console.error('에러 발생:', error);
                document.getElementById('response').innerText = '에러 발생: ' + error.message;
            });
    }
</script>
</body>
</html>
